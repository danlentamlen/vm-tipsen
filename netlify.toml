[build]
  command = "npm run build"
  publish = "dist"
  functions = "Netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

# Vite dev-proxy — endast aktiv lokalt, ignoreras i produktion
[[redirects]]
  from = "/@*"
  to   = "http://localhost:5173/@:splat"
  status = 200
  force = true

[[redirects]]
  from = "/node_modules/*"
  to   = "http://localhost:5173/node_modules/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/src/*"
  to   = "http://localhost:5173/src/:splat"
  status = 200
  force = true

# SPA fallback — måste vara sist
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Kör var 5:e minut under VM (11 jun – 19 jul 2026) — snabbare resultat & snapshot
[[scheduled-functions]]
  name = "sync-results"
  schedule = "*/5 * * * *"

# Hämtar odds från The Odds API en gång per dag kl 15:00 CEST (13:00 UTC)
[[scheduled-functions]]
  name = "odds-fetch"
  schedule = "0 13 * * *"

# Tar bort användare utan vinflaska vid deadline: 11 juni 2026 kl 16:00 CEST (14:00 UTC)
[[scheduled-functions]]
  name = "admin-remove-no-wine"
  schedule = "0 14 11 6 *"