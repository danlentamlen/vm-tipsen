[build]
  command = "npm run build"
  publish = "dist"
  functions = "Netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

# SPA fallback — alla routes pekar på index.html så React Router kan hantera dem
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Kör var 15:e minut under VM (11 jun – 19 jul 2026)
[[scheduled-functions]]
  name = "sync-results"
  schedule = "*/15 * * * *"